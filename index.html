<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Tarefas - Login</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="bootstrap" href="bootstrap/js/bootstrap.bundle.js">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .login-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            color: gold;
            font-size: 2rem;
        }
        
        .login-header p {
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>📋 Golden-Place</h1>
                <p>Faça login para acessar o sistema</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="exemplo@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Entrar</button>
                </div>

                <div style="text-align: center; margin-top: 20px;">
                    <a href="#" style="color: #667eea; text-decoration: none;">Esqueceu a senha?</a>
                </div>
            </form>

            <!-- Credenciais para teste (remover depois) -->
            <div style="margin-top: 30px; padding: 15px; background: #f5f5f5; border-radius: 8px; font-size: 0.9rem;">
                <p style="font-weight: bold; margin-bottom: 10px;">🔐 Credenciais de teste:</p>
                <p><strong>Admin:</strong> admin@email.com / admin123</p>
                <p><strong>Membro:</strong> joao@email.com / 123456</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Simulação simples de login
            if (email && password) {
                alert('Login realizado com sucesso! (simulação)');
                window.location.href = 'dashboard.html';
            } else {
                alert('Preencha todos os campos');
            }
        });
    </script>
</body>

</html>
